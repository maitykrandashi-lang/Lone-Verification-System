<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login · StatementIQ</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="center-screen">
    <div class="auth-card">
      <div class="brand">Statement<span>IQ</span></div>
      <div class="subtitle">Sign in to analyse your payslips & bank statements</div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, msg in messages %}
          <div class="flash {{ category }}">{{ msg }}</div>
        {% endfor %}
      {% endwith %}

      <form method="POST">
        <label for="identifier">Username or Email</label>
        <input type="text" id="identifier" name="identifier" required autofocus>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>

        <button type="submit" class="btn-primary">Log In</button>
      </form>

      <div class="link-row">
        Don't have an account? <a href="{{ url_for('register') }}">Create one</a>
      </div>
    </div>
  </div>
</body>
</html>
